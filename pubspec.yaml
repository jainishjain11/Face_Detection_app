name: face_detection_app
description: A real-time face detection app with Firebase authentication.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_mlkit_face_detection: ^0.10.0
  camera: ^0.11.0+2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  pin_code_fields: ^8.0.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
